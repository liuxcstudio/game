<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="full-screen" content="yes"/>
  <meta name="screen-orientation" content="landscape"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="theme-color" content="#171717">
  <meta name="description" content="打工生活模拟器 - 本地离线版 v2.1.9">

  <title>打工生活模拟器</title>

  <link rel="stylesheet" type="text/css" href="style-desktop.css"/>
  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <!-- Performance: preload critical scripts -->
  <link rel="preload" href="src/settings.js" as="script">
  <link rel="preload" href="src/sdk-stub.js" as="script">
  <link rel="preload" href="cocos2d-js-min.js" as="script">
</head>
<body>
<h1 class="header">打工生活模拟器</h1>

<div id="GameDiv" style="width:1280px; height:720px;">
  <canvas id="GameCanvas" width="1280" height="720"></canvas>
  <div id="splash">
    <div class="progress-bar stripes">
      <span style="width: 0%"></span>
    </div>
    <div id="splash-tip" style="position:absolute;bottom:12%;left:50%;transform:translateX(-50%);color:#666;font-size:12px;font-family:sans-serif;"></div>
  </div>
</div>

<!-- Toolbar -->
<div id="game-toolbar" style="position:fixed;top:8px;right:8px;z-index:9999;display:none;">
  <button id="btn-fullscreen" title="全屏" style="background:rgba(0,0,0,0.5);color:#fff;border:1px solid #555;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:13px;margin-left:4px;">&#x26F6; 全屏</button>
  <button id="btn-save" title="存档管理" style="background:rgba(0,0,0,0.5);color:#fff;border:1px solid #555;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:13px;margin-left:4px;">&#x1F4BE; 存档</button>
  <button id="btn-perf" title="性能" style="background:rgba(0,0,0,0.5);color:#fff;border:1px solid #555;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:13px;margin-left:4px;">&#x1F4CA; 性能</button>
</div>

<!-- Save Manager Modal -->
<div id="save-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:10000;justify-content:center;align-items:center;">
  <div style="background:#2a2a2a;border-radius:8px;padding:20px;max-width:480px;width:90%;color:#eee;font-family:sans-serif;">
    <h3 style="margin:0 0 12px 0;color:#3dc5de;">存档管理</h3>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
      <button id="btn-export-save" style="flex:1;padding:8px;background:#3dc5de;color:#000;border:none;border-radius:4px;cursor:pointer;font-size:13px;">导出存档</button>
      <button id="btn-import-save" style="flex:1;padding:8px;background:#555;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;">导入存档</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
      <button id="btn-backup-save" style="flex:1;padding:8px;background:#4CAF50;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;">备份存档</button>
      <button id="btn-restore-save" style="flex:1;padding:8px;background:#FF9800;color:#000;border:none;border-radius:4px;cursor:pointer;font-size:13px;">恢复备份</button>
    </div>
    <button id="btn-clear-save" style="width:100%;padding:8px;background:#f44336;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;">清除所有存档</button>
    <div id="save-status" style="margin-top:10px;font-size:12px;color:#888;min-height:18px;"></div>
    <input type="file" id="save-file-input" accept=".json" style="display:none;">
    <button id="btn-close-modal" style="position:absolute;top:10px;right:14px;background:none;border:none;color:#888;font-size:20px;cursor:pointer;">&times;</button>
  </div>
</div>

<p class="footer">本地离线版 v2.1.9 | Cocos Creator 2.4.0</p>

<script src="src/settings.js" charset="utf-8"></script>
<script src="main.js" charset="utf-8"></script>
</body>
</html>
