<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>打工生活模拟器 - 本地离线版</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="full-screen" content="yes">
  <meta name="screen-orientation" content="landscape">
  <meta name="x5-fullscreen" content="true">
  <meta name="360-fullscreen" content="true">
  <meta name="renderer" content="webkit">
  <meta name="force-rendering" content="webkit">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="theme-color" content="#171717">
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" type="text/css" href="style-desktop.css">
  <link rel="stylesheet" type="text/css" href="style-mobile.css">
  <style>
    /* 骨架屏加载优化 - 替代空白等待 */
    #splash .loading-tip {
      color: #999;
      font-size: 13px;
      position: absolute;
      top: 85%;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      animation: tip-pulse 2s ease-in-out infinite;
    }
    @keyframes tip-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    /* FPS 显示优化 */
    #fps-container {
      position: fixed;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      color: #0f0;
      font: 12px monospace;
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 9999;
      display: none;
    }
    /* 全屏按钮 */
    #fullscreen-btn {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 9999;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      display: none;
      transition: background 0.2s;
    }
    #fullscreen-btn:hover { background: rgba(0,0,0,0.8); }
    /* 存档管理面板 */
    #save-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #2a2a2a;
      color: #eee;
      border: 1px solid #555;
      border-radius: 8px;
      padding: 20px;
      z-index: 10000;
      display: none;
      min-width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #save-panel h3 { margin: 0 0 15px; font-size: 16px; }
    #save-panel .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    #save-panel button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      transition: opacity 0.2s;
    }
    #save-panel button:hover { opacity: 0.85; }
    #save-panel .btn-primary { background: #4CAF50; color: #fff; }
    #save-panel .btn-warn { background: #ff9800; color: #fff; }
    #save-panel .btn-danger { background: #f44336; color: #fff; }
    #save-panel .btn-close { background: #666; color: #fff; }
    #save-panel textarea {
      width: 100%;
      height: 60px;
      margin-top: 8px;
      background: #1a1a1a;
      color: #eee;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 6px;
      font-size: 12px;
      resize: vertical;
    }
    #save-panel .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }
    /* 性能统计 */
    #perf-stats {
      position: fixed;
      bottom: 8px;
      left: 8px;
      background: rgba(0,0,0,0.6);
      color: #aaa;
      font: 11px monospace;
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 9999;
      display: none;
    }
  </style>
</head>
<body>
<h1 class="header">打工生活模拟器</h1>

<div id="GameDiv">
  <canvas id="GameCanvas"></canvas>
  <div id="splash">
    <div class="progress-bar stripes">
      <span style="width: 0%"></span>
    </div>
    <div class="loading-tip">正在加载游戏资源...</div>
  </div>
</div>

<p class="footer">本地离线版 v2.1.9 | Cocos Creator 2.4.0</p>

<!-- 优化控件 -->
<button id="fullscreen-btn" title="全屏">⛶ 全屏</button>
<div id="fps-container">FPS: --</div>
<div id="perf-stats">MEM: --</div>

<!-- 存档管理面板 -->
<div id="save-panel">
  <div class="overlay" onclick="toggleSavePanel()"></div>
  <h3>存档管理</h3>
  <div class="btn-row">
    <button class="btn-primary" onclick="exportSave()">导出存档</button>
    <button class="btn-warn" onclick="importSave()">导入存档</button>
    <button class="btn-danger" onclick="clearSave()">清除存档</button>
  </div>
  <textarea id="save-data" placeholder="导出的存档数据会显示在这里，导入时粘贴到此处"></textarea>
  <div class="btn-row">
    <button class="btn-close" onclick="toggleSavePanel()">关闭</button>
  </div>
</div>

<!-- 脚本按依赖顺序加载 -->
<script src="src/settings.js" charset="utf-8"></script>
<script src="main.js" charset="utf-8"></script>
</body>
</html>
